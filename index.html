<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Evolution Adventure - Biologi XII</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #000;
            font-family: 'Press Start 2P', cursive;
            touch-action: none;
            width: 100vw;
            height: 100vh;
        }

        #game-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #1a1a1a;
            overflow: hidden;
        }

        canvas {
            background: linear-gradient(to bottom, #87CEEB, #E0F6FF);
            display: block;
            image-rendering: pixelated;
            max-width: 100%;
            max-height: 100%;
        }

        #ui-layer {
            position: absolute;
            top: max(20px, env(safe-area-inset-top));
            left: max(20px, env(safe-area-inset-left));
            color: #333;
            pointer-events: none;
            z-index: 100;
        }

        #settings-menu {
            position: absolute;
            top: max(20px, env(safe-area-inset-top));
            right: max(20px, env(safe-area-inset-right));
            z-index: 110;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 5px;
        }

        .control-panel {
            background: rgba(255, 255, 255, 0.95);
            border: 3px solid #333;
            padding: 12px;
            display: none;
            flex-direction: column;
            gap: 12px;
            margin-top: 5px;
            min-width: 200px;
            box-shadow: 4px 4px 0px #000;
        }

        .setting-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 9px;
            color: #333;
        }

        #mobile-controls {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            padding-bottom: max(35px, env(safe-area-inset-bottom));
            padding-left: max(30px, env(safe-area-inset-left));
            padding-right: max(30px, env(safe-area-inset-right));
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            pointer-events: none;
            z-index: 150;
        }

        .control-group {
            display: flex;
            gap: 20px;
            pointer-events: auto;
        }

        .touch-btn {
            width: 75px;
            height: 75px;
            background: rgba(255, 255, 255, 0.4);
            border: 4px solid rgba(0, 0, 0, 0.5);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #000;
            font-size: 28px;
            user-select: none;
            -webkit-user-select: none;
            backdrop-filter: blur(5px);
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .touch-btn:active {
            background: rgba(255, 255, 255, 0.7);
            transform: scale(0.9);
            border-color: #000;
        }

        .quiz-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 20px;
            border: 4px solid #333;
            box-shadow: 6px 6px 0px #000;
            display: none;
            flex-direction: column;
            gap: 10px;
            width: 90%;
            max-width: 500px;
            z-index: 200;
        }

        .btn-option {
            background: #4A90E2;
            color: white;
            border: 2px solid #333;
            padding: 12px;
            font-family: 'Press Start 2P', cursive;
            font-size: 8px;
            cursor: pointer;
            text-align: left;
        }

        #message-box {
            position: absolute;
            bottom: 40%;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.85);
            color: white;
            padding: 12px;
            border: 2px solid #fff;
            display: none;
            font-size: 9px;
            text-align: center;
            z-index: 180;
            width: 70%;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        .btn-small {
            background: #fff;
            border: 2px solid #333;
            padding: 8px 12px;
            cursor: pointer;
            font-family: 'Press Start 2P', cursive;
            font-size: 8px;
            box-shadow: 3px 3px 0px #000;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 40px;
            height: 24px;
        }

        .switch input { opacity: 0; width: 0; height: 0; }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #ccc;
            transition: .4s;
            border: 2px solid #333;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 14px; width: 14px;
            left: 3px; bottom: 3px;
            background-color: white;
            transition: .4s;
            border: 2px solid #333;
        }

        input:checked + .slider { background-color: #4CAF50; }
        input:checked + .slider:before { transform: translateX(16px); }

        @media (max-height: 500px) {
            .touch-btn { width: 60px; height: 60px; font-size: 20px; }
            #mobile-controls { padding-bottom: 20px; }
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="settings-menu">
            <button id="btn-settings-toggle" class="btn-small">MENU ⚙️</button>
            <div id="panel-settings" class="control-panel">
                <div class="setting-item">
                    <span>MUSIK</span>
                    <label class="switch">
                        <input type="checkbox" id="check-music">
                        <span class="slider"></span>
                    </label>
                </div>
                <div class="setting-item">
                    <span>KONTROL</span>
                    <label class="switch">
                        <input type="checkbox" id="check-controls" checked>
                        <span class="slider"></span>
                    </label>
                </div>
                <button id="btn-fullscreen" class="btn-small mt-2" style="width: 100%;">FULLSCREEN</button>
            </div>
        </div>

        <div id="ui-layer">
            <div style="font-size: 10px;">SKOR: <span id="score">0</span></div>
            <div style="font-size: 10px;">DNA: <span id="dna-count">0</span></div>
            <div id="level-indicator" style="margin-top: 4px; font-size: 8px;">Level: Organisme Primitif</div>
        </div>

        <canvas id="gameCanvas"></canvas>

        <div id="mobile-controls">
            <div class="control-group">
                <div id="btn-left" class="touch-btn">◀</div>
                <div id="btn-right" class="touch-btn">▶</div>
            </div>
            <div class="control-group">
                <div id="btn-jump" class="touch-btn">▲</div>
            </div>
        </div>

        <div id="quiz-container" class="quiz-overlay">
            <div style="font-size: 8px; margin-bottom: 8px; color: #4A90E2;">GERBANG EVOLUSI</div>
            <h2 id="question">Pertanyaan?</h2>
            <div id="options-list" class="flex flex-col gap-2"></div>
        </div>

        <div id="message-box"></div>
    </div>

    <audio id="bgMusic" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3" type="audio/mpeg">
    </audio>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const dnaEl = document.getElementById('dna-count');
        const levelIndicator = document.getElementById('level-indicator');
        const quizContainer = document.getElementById('quiz-container');
        const questionEl = document.getElementById('question');
        const optionsList = document.getElementById('options-list');
        const messageBox = document.getElementById('message-box');
        const bgMusic = document.getElementById('bgMusic');
        
        const settingsToggle = document.getElementById('btn-settings-toggle');
        const settingsPanel = document.getElementById('panel-settings');
        const musicCheck = document.getElementById('check-music');
        const controlsCheck = document.getElementById('check-controls');
        const mobileControlsContainer = document.getElementById('mobile-controls');
        const fullscreenBtn = document.getElementById('btn-fullscreen');

        const BASE_WIDTH = 1000;
        const BASE_HEIGHT = 450;
        
        function resize() {
            const windowWidth = window.innerWidth;
            const windowHeight = window.innerHeight;
            const scale = Math.min(windowWidth / BASE_WIDTH, windowHeight / BASE_HEIGHT);
            canvas.width = BASE_WIDTH;
            canvas.height = BASE_HEIGHT;
            canvas.style.width = (BASE_WIDTH * scale) + 'px';
            canvas.style.height = (BASE_HEIGHT * scale) + 'px';
        }

        window.addEventListener('resize', resize);
        window.addEventListener('orientationchange', () => setTimeout(resize, 300));
        resize();

        const GRAVITY = 0.48;
        const JUMP_FORCE = -11.5;
        const SPEED = 4.8;
        const START_X = 100;
        const START_Y = 300;

        let score = 0;
        let dnaCount = 0;
        let gameActive = true;
        let cameraX = 0;
        let currentGateIndex = 0;

        // SISTEM EVOLUSI: Tahapan visual karakter
        const evolutionStages = [
            { name: "Organisme Primitif", color: "#FF5733", width: 32, height: 32 },
            { name: "Makhluk Seluler", color: "#33FF57", width: 35, height: 40 },
            { name: "Amfibi Awal", color: "#3357FF", width: 40, height: 45 },
            { name: "Reptilia Cerdas", color: "#A033FF", width: 45, height: 50 },
            { name: "Makhluk Sempurna", color: "#FFD700", width: 50, height: 60 }
        ];

        const player = {
            x: START_X,
            y: START_Y,
            width: evolutionStages[0].width,
            height: evolutionStages[0].height,
            velX: 0,
            velY: 0,
            jumping: false,
            grounded: false,
            color: evolutionStages[0].color,
            stage: 0
        };

        const keys = {};
        const touchInput = { left: false, right: false, jump: false };

        const platforms = [
            { x: 0, y: 400, w: 1500, h: 50, type: 'ground' },
            { x: 300, y: 310, w: 200, h: 20, type: 'platform' },
            { x: 600, y: 230, w: 200, h: 20, type: 'platform' },
            { x: 900, y: 310, w: 200, h: 20, type: 'platform' },
            { x: 1250, y: 320, w: 400, h: 20, type: 'platform' },
            { x: 1700, y: 400, w: 1800, h: 50, type: 'ground' },
            { x: 1850, y: 280, w: 250, h: 20, type: 'platform' },
            { x: 2200, y: 200, w: 250, h: 20, type: 'platform' },
            { x: 2600, y: 300, w: 250, h: 20, type: 'platform' },
            { x: 3500, y: 400, w: 1500, h: 50, type: 'ground' }
        ];

        const collectibles = [
            { x: 350, y: 270, w: 20, h: 20, gathered: false },
            { x: 650, y: 190, w: 20, h: 20, gathered: false },
            { x: 950, y: 270, w: 20, h: 20, gathered: false },
            { x: 1350, y: 280, w: 20, h: 20, gathered: false },
            { x: 2000, y: 240, w: 20, h: 20, gathered: false },
            { x: 2300, y: 160, w: 20, h: 20, gathered: false }
        ];

        const enemies = [
            { x: 700, y: 368, w: 60, h: 32, startX: 500, endX: 1100, speed: 2.5, color: '#2E7D32' },
            { x: 1800, y: 368, w: 60, h: 32, startX: 1700, endX: 2400, speed: 3.8, color: '#2E7D32' },
            { x: 2800, y: 368, w: 60, h: 32, startX: 2500, endX: 3300, speed: 4.8, color: '#C62828' }
        ];

        const gates = [
            { x: 1100, y: 300, w: 60, h: 100, active: true, id: 0 },
            { x: 1600, y: 300, w: 60, h: 100, active: true, id: 1 },
            { x: 2500, y: 300, w: 60, h: 100, active: true, id: 2 },
            { x: 3400, y: 300, w: 60, h: 100, active: true, id: 3 }
        ];

        const questions = [
            { q: "Siapa tokoh yang mengemukakan teori jerapah berleher panjang karena menjulurkan leher?", options: ["Charles Darwin", "Lamarck", "Weismann", "Mendel"], correct: 1 },
            { q: "Asal-usul sama tapi fungsi berbeda disebut...", options: ["Analogi", "Homologi", "Konvergensi", "Spesiasi"], correct: 1 },
            { q: "Faktor utama evolusi menurut Darwin adalah...", options: ["Mutasi", "Seleksi Alam", "Adaptasi", "Rekombinasi"], correct: 1 },
            { q: "Ekor tikus tetap panjang meski dipotong berkali-kali membantah teori...", options: ["Darwin", "Hardy-Weinberg", "Lamarck", "Spallanzani"], correct: 2 },
            { q: "Spesies baru akibat penghalang geografis disebut isolasi...", options: ["Geografis", "Reproduksi", "Tingkah laku", "Musim"], correct: 0 },
            { q: "Sirip hiu dan lumba-lumba (fungsi sama, asal beda) disebut...", options: ["Homologi", "Divergensi", "Analogi", "Radiasi"], correct: 2 },
            { q: "Jika P = 0,6, berapa frekuensi heterozigot (2Pq)?", options: ["0,36", "0,16", "0,48", "0,24"], correct: 2 }
        ];

        function respawnPlayer(reason) {
            player.x = START_X;
            player.y = START_Y;
            player.velX = 0;
            player.velY = 0;
            cameraX = 0;
            showMessage(reason);
        }

        settingsToggle.onclick = (e) => {
            e.stopPropagation();
            settingsPanel.style.display = settingsPanel.style.display === 'flex' ? 'none' : 'flex';
        };

        musicCheck.onchange = () => {
            if (musicCheck.checked) {
                bgMusic.play().catch(() => {
                    musicCheck.checked = false;
                    showMessage("Sentuh layar dulu!");
                });
            } else {
                bgMusic.pause();
            }
        };

        controlsCheck.onchange = () => {
            mobileControlsContainer.style.display = controlsCheck.checked ? 'flex' : 'none';
        };

        fullscreenBtn.onclick = () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(() => showMessage("Gagal Fullscreen"));
            } else {
                document.exitFullscreen();
            }
            settingsPanel.style.display = 'none';
        };

        const setupTouchBtn = (id, property) => {
            const btn = document.getElementById(id);
            const start = (e) => { e.preventDefault(); touchInput[property] = true; };
            const end = (e) => { e.preventDefault(); touchInput[property] = false; };
            btn.addEventListener('touchstart', start);
            btn.addEventListener('touchend', end);
            btn.addEventListener('mousedown', start);
            btn.addEventListener('mouseup', end);
            btn.addEventListener('mouseleave', end);
        };

        setupTouchBtn('btn-left', 'left');
        setupTouchBtn('btn-right', 'right');
        setupTouchBtn('btn-jump', 'jump');

        // Fungsi menggambar pemain dengan efek evolusi
        function drawPlayer() {
            const currentStage = evolutionStages[player.stage];
            
            // Efek cahaya jika sudah makhluk sempurna
            if (player.stage === 4) {
                ctx.shadowBlur = 15;
                ctx.shadowColor = "#FFD700";
            }

            ctx.fillStyle = player.color;
            ctx.fillRect(player.x - cameraX, player.y, player.width, player.height);
            
            // Reset shadow
            ctx.shadowBlur = 0;

            // Mata karakter
            ctx.fillStyle = '#fff';
            const eyeSize = 6 + (player.stage * 1);
            ctx.fillRect(player.x - cameraX + (player.width - eyeSize - 4), player.y + 8, eyeSize, eyeSize);
            ctx.fillStyle = '#000';
            ctx.fillRect(player.x - cameraX + (player.width - eyeSize/2 - 4), player.y + 10, eyeSize/2, eyeSize/2);

            // Aksesoris evolusi (Antena/Struktur)
            if (player.stage >= 2) {
                ctx.fillStyle = player.color;
                ctx.fillRect(player.x - cameraX + player.width/4, player.y - 8, 4, 8);
                ctx.beginPath();
                ctx.arc(player.x - cameraX + player.width/4 + 2, player.y - 10, 4, 0, Math.PI*2);
                ctx.fill();
            }
        }

        function drawEnemies() {
            enemies.forEach(e => {
                ctx.fillStyle = e.color;
                ctx.fillRect(e.x - cameraX, e.y, e.w, e.h);
                ctx.fillStyle = '#fff';
                ctx.fillRect(e.speed > 0 ? e.x - cameraX + e.w - 10 : e.x - cameraX + 5, e.y + 5, 5, 5);
            });
        }

        function drawPlatforms() {
            platforms.forEach(p => {
                ctx.fillStyle = p.type === 'ground' ? '#4d2911' : '#2d5a27';
                ctx.fillRect(p.x - cameraX, p.y, p.w, p.h);
                if(p.type === 'ground') {
                    ctx.fillStyle = '#4CAF50';
                    ctx.fillRect(p.x - cameraX, p.y, p.w, 10);
                }
            });
        }

        function drawCollectibles() {
            collectibles.forEach(c => {
                if (!c.gathered) {
                    ctx.fillStyle = '#FFD700';
                    ctx.beginPath();
                    ctx.arc(c.x - cameraX + 10, c.y + 10, 10, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.fillStyle = '#fff';
                    ctx.font = '8px "Press Start 2P"';
                    ctx.fillText('D', c.x - cameraX + 6, c.y + 14);
                }
            });
        }

        function drawGates() {
            gates.forEach(g => {
                if (g.active) {
                    ctx.fillStyle = '#444';
                    ctx.fillRect(g.x - cameraX, g.y, g.w, g.h);
                    ctx.fillStyle = '#777';
                    ctx.fillRect(g.x - cameraX + 8, g.y + 10, g.w - 16, g.h - 10);
                    ctx.fillStyle = '#FFD700';
                    ctx.fillRect(g.x - cameraX + g.w/2 - 2, g.y + 40, 4, 20);
                }
            });
        }

        function showMessage(text) {
            messageBox.innerText = text;
            messageBox.style.display = 'block';
            setTimeout(() => messageBox.style.display = 'none', 1500);
        }

        // Fungsi memperbarui tahap evolusi pemain
        function evolvePlayer() {
            if (player.stage < evolutionStages.length - 1) {
                player.stage++;
                const next = evolutionStages[player.stage];
                player.color = next.color;
                player.width = next.width;
                player.height = next.height;
                levelIndicator.innerText = `Level: ${next.name}`;
                showMessage(`BEREVOLUSI MENJADI ${next.name.toUpperCase()}!`);
            }
        }

        function triggerQuiz(gateId) {
            gameActive = false;
            const q = questions[currentGateIndex];
            questionEl.innerText = q.q;
            optionsList.innerHTML = '';
            q.options.forEach((opt, idx) => {
                const b = document.createElement('button');
                b.className = 'btn-option';
                b.innerText = opt;
                b.onclick = () => {
                    if (idx === q.correct) {
                        evolvePlayer(); // Karakter berevolusi
                        gates.find(g => g.id === gateId).active = false;
                        score += 200;
                        currentGateIndex++;
                        scoreEl.innerText = score;
                    } else {
                        respawnPlayer("Gagal Adaptasi! Kamu Terlempar!");
                    }
                    quizContainer.style.display = 'none';
                    gameActive = true;
                    requestAnimationFrame(update);
                };
                optionsList.appendChild(b);
            });
            quizContainer.style.display = 'flex';
        }

        function update() {
            if (!gameActive) return;

            if (keys['ArrowRight'] || keys['d'] || touchInput.right) {
                if (player.velX < SPEED) player.velX++;
            }
            if (keys['ArrowLeft'] || keys['a'] || touchInput.left) {
                if (player.velX > -SPEED) player.velX--;
            }
            if ((keys['ArrowUp'] || keys[' '] || touchInput.jump) && !player.jumping && player.grounded) {
                player.jumping = true;
                player.grounded = false;
                player.velY = JUMP_FORCE;
            }

            player.velY += GRAVITY;
            player.x += player.velX;
            player.y += player.velY;
            player.velX *= 0.85;

            player.grounded = false;
            platforms.forEach(p => {
                if (player.x < p.x + p.w && player.x + player.width > p.x &&
                    player.y < p.y + p.h && player.y + player.height > p.y) {
                    if (player.velY > 0 && player.y + player.height < p.y + 20) {
                        player.grounded = true;
                        player.jumping = false;
                        player.y = p.y - player.height;
                        player.velY = 0;
                    }
                }
            });

            enemies.forEach(e => {
                e.x += e.speed;
                if(e.x > e.endX || e.x < e.startX) e.speed *= -1;
                if (player.x < e.x + e.w && player.x + player.width > e.x &&
                    player.y < e.y + e.h && player.y + player.height > e.y) {
                    if(player.velY > 0 && player.y + player.height < e.y + 15) {
                        e.x = -5000;
                        score += 150;
                        scoreEl.innerText = score;
                        player.velY = -7;
                    } else {
                        respawnPlayer("Punah Dimakan Predator!");
                    }
                }
            });

            gates.forEach(g => {
                if (g.active && player.x < g.x + g.w && player.x + player.width > g.x &&
                    player.y < g.y + g.h && player.y + player.height > g.y) {
                    triggerQuiz(g.id);
                }
            });

            collectibles.forEach(c => {
                if (!c.gathered && player.x < c.x + c.w && player.x + player.width > c.x &&
                    player.y < c.y + c.h && player.y + player.height > c.y) {
                    c.gathered = true;
                    dnaCount++;
                    dnaEl.innerText = dnaCount;
                    score += 50;
                    scoreEl.innerText = score;
                }
            });

            if (player.x > BASE_WIDTH * 0.3) {
                cameraX = player.x - BASE_WIDTH * 0.3;
            }

            if (player.y > BASE_HEIGHT) {
                respawnPlayer("Gagal Beradaptasi Dengan Jurang!");
            }

            draw();
            requestAnimationFrame(update);
        }

        function draw() {
            ctx.clearRect(0, 0, BASE_WIDTH, BASE_HEIGHT);
            
            // Awan
            ctx.fillStyle = 'rgba(255,255,255,0.4)';
            ctx.beginPath();
            ctx.arc(200 - (cameraX*0.1), 80, 20, 0, Math.PI*2);
            ctx.arc(235 - (cameraX*0.1), 80, 30, 0, Math.PI*2);
            ctx.arc(265 - (cameraX*0.1), 80, 20, 0, Math.PI*2);
            ctx.fill();

            ctx.beginPath();
            ctx.arc(700 - (cameraX*0.15), 120, 25, 0, Math.PI*2);
            ctx.arc(740 - (cameraX*0.15), 120, 35, 0, Math.PI*2);
            ctx.arc(775 - (cameraX*0.15), 120, 25, 0, Math.PI*2);
            ctx.fill();

            drawPlatforms();
            drawCollectibles();
            drawGates();
            drawEnemies();
            drawPlayer();

            if(player.x > 4500) {
                gameActive = false;
                ctx.fillStyle = 'rgba(0,0,0,0.85)';
                ctx.fillRect(0,0, BASE_WIDTH, BASE_HEIGHT);
                ctx.fillStyle = '#FFD700';
                ctx.font = '16px "Press Start 2P"';
                ctx.textAlign = "center";
                ctx.fillText("EVOLUSI SEMPURNA!", BASE_WIDTH/2, 200);
                ctx.fillStyle = '#fff';
                ctx.font = '10px "Press Start 2P"';
                ctx.fillText(`Kamu mencapai puncak hierarki biologis!`, BASE_WIDTH/2, 240);
                ctx.fillText(`Skor Akhir: ${score}`, BASE_WIDTH/2, 280);
            }
        }

        window.addEventListener('keydown', e => keys[e.key] = true);
        window.addEventListener('keyup', e => keys[e.key] = false);

        window.onload = () => {
            if (window.innerWidth > 1024) {
                controlsCheck.checked = false;
                mobileControlsContainer.style.display = 'none';
            }
            update();
            resize();
        };

    </script>
